<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;900&amp;display=swap');
      text { font-family: 'Inter', 'Arial Black', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#E8DCC8"/>

  <!-- Geometric decorations — top-right corner blocks -->
  <rect x="900" y="0" width="380" height="8" fill="#CD5C3C"/>
  <rect x="1180" y="0" width="100" height="120" fill="#C8D8D0" opacity="0.5"/>
  <rect x="1220" y="0" width="60" height="60" fill="#CD5C3C" opacity="0.4"/>

  <!-- Bottom-left stripe -->
  <rect x="0" y="600" width="1280" height="40" fill="#2C2C2C"/>
  <rect x="0" y="585" width="420" height="15" fill="#CD5C3C"/>
  <rect x="0" y="570" width="180" height="15" fill="#C8D8D0"/>

  <!-- ===== MAIN TITLE CARD ===== -->
  <!-- Shadow -->
  <rect x="38" y="58" width="800" height="210" fill="#2C2C2C"/>
  <!-- Card -->
  <rect x="28" y="48" width="800" height="210" fill="#CD5C3C" stroke="#2C2C2C" stroke-width="4"/>

  <!-- Title text -->
  <text x="64" y="135" font-size="74" font-weight="900" fill="#E8DCC8" letter-spacing="-2">SOCIAL CONTENT</text>
  <text x="64" y="215" font-size="74" font-weight="900" fill="#E8DCC8" letter-spacing="-2">MACHINE</text>

  <!-- Subtitle bar inside card -->
  <rect x="28" y="224" width="800" height="34" fill="#2C2C2C"/>
  <text x="64" y="247" font-size="13" font-weight="600" fill="#E8DCC8" letter-spacing="3">ANTEK AUTOMATION  ·  CLAUDE CODE PIPELINE  ·  v6</text>

  <!-- ===== V6 BADGE ===== -->
  <rect x="844" y="58" width="56" height="56" fill="#E8DCC8" stroke="#2C2C2C" stroke-width="4"/>
  <text x="872" y="97" font-size="16" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0">V6</text>

  <!-- ===== SLASH COMMAND PILLS (row) ===== -->
  <!-- /run -->
  <rect x="36" y="310" width="70" height="36" fill="#2C2C2C"/>
  <rect x="28" y="302" width="70" height="36" fill="#E8DCC8" stroke="#2C2C2C" stroke-width="3"/>
  <text x="63" y="325" font-size="13" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0.5">/run</text>

  <!-- /content -->
  <rect x="116" y="310" width="90" height="36" fill="#2C2C2C"/>
  <rect x="108" y="302" width="90" height="36" fill="#C8D8D0" stroke="#2C2C2C" stroke-width="3"/>
  <text x="153" y="325" font-size="13" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0.5">/content</text>

  <!-- /gbp -->
  <rect x="216" y="310" width="66" height="36" fill="#2C2C2C"/>
  <rect x="208" y="302" width="66" height="36" fill="#E8DCC8" stroke="#2C2C2C" stroke-width="3"/>
  <text x="241" y="325" font-size="13" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0.5">/gbp</text>

