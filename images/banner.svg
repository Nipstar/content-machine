  <text x="928" y="110" font-size="36" font-weight="900" fill="#CD5C3C" opacity="0.8">01</text>
  <text x="980" y="102" font-size="14" font-weight="900" fill="#2C2C2C">SOCIAL POSTS</text>
  <text x="980" y="120" font-size="11" font-weight="600" fill="#4a5568">LinkedIn · X · Facebook · Instagram</text>
  <line x1="928" y1="132" x2="1228" y2="132" stroke="#2C2C2C" stroke-width="1.5" opacity="0.25"/>

  <!-- Pipeline 02 -->
  <text x="928" y="166" font-size="36" font-weight="900" fill="#CD5C3C" opacity="0.8">02</text>
  <text x="980" y="158" font-size="14" font-weight="900" fill="#2C2C2C">GBP POSTS</text>
  <text x="980" y="176" font-size="11" font-weight="600" fill="#4a5568">Branded images · R2 · PostgreSQL queue</text>
  <line x1="928" y1="188" x2="1228" y2="188" stroke="#2C2C2C" stroke-width="1.5" opacity="0.25"/>

  <!-- Pipeline 03 -->
  <text x="928" y="222" font-size="36" font-weight="900" fill="#CD5C3C" opacity="0.8">03</text>
  <text x="980" y="214" font-size="14" font-weight="900" fill="#2C2C2C">YOUTUBE SHORTS</text>
  <text x="980" y="232" font-size="11" font-weight="600" fill="#4a5568">6 slides · TTS voice · Ken Burns · MP4</text>
  <line x1="928" y1="244" x2="1228" y2="244" stroke="#2C2C2C" stroke-width="1.5" opacity="0.25"/>

  <!-- Pipeline 04 -->
  <text x="928" y="278" font-size="36" font-weight="900" fill="#CD5C3C" opacity="0.8">04</text>
  <text x="980" y="270" font-size="14" font-weight="900" fill="#2C2C2C">PODCAST EPISODES</text>
  <text x="980" y="288" font-size="11" font-weight="600" fill="#4a5568">Fish Audio TTS · RSS.com · Ghost embed</text>
  <line x1="928" y1="300" x2="1228" y2="300" stroke="#2C2C2C" stroke-width="1.5" opacity="0.25"/>

  <!-- Pipeline 05 -->
  <text x="928" y="334" font-size="36" font-weight="900" fill="#CD5C3C" opacity="0.8">05</text>
  <text x="980" y="326" font-size="14" font-weight="900" fill="#2C2C2C">SOCIAL CARDS</text>
  <text x="980" y="344" font-size="11" font-weight="600" fill="#4a5568">Puppeteer PNGs · 3 sizes · 5 card types</text>
