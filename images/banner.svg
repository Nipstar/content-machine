  <rect x="474" y="302" width="76" height="36" fill="#C8D8D0" stroke="#2C2C2C" stroke-width="3"/>
  <text x="512" y="325" font-size="13" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0.5">/cards</text>

