  <rect x="928" y="398" width="56" height="20" fill="#2C2C2C"/>
  <text x="956" y="413" font-size="10" font-weight="900" fill="#E8DCC8" text-anchor="middle">TypeScript</text>
  <rect x="992" y="398" width="52" height="20" fill="#2C2C2C"/>
  <text x="1018" y="413" font-size="10" font-weight="900" fill="#E8DCC8" text-anchor="middle">Puppeteer</text>
  <rect x="1052" y="398" width="44" height="20" fill="#2C2C2C"/>
  <text x="1074" y="413" font-size="10" font-weight="900" fill="#E8DCC8" text-anchor="middle">FFmpeg</text>
  <rect x="1104" y="398" width="52" height="20" fill="#2C2C2C"/>
  <text x="1130" y="413" font-size="10" font-weight="900" fill="#E8DCC8" text-anchor="middle">Blotato</text>
  <rect x="1164" y="398" width="60" height="20" fill="#2C2C2C"/>
  <text x="1194" y="413" font-size="10" font-weight="900" fill="#E8DCC8" text-anchor="middle">Fish Audio</text>

  <!-- Bottom info in panel -->
  <rect x="908" y="460" width="340" height="78" fill="#2C2C2C" opacity="0.08"/>
  <text x="928" y="482" font-size="11" font-weight="900" fill="#2C2C2C" letter-spacing="1">RSS → Claude Code → Blotato MCP → Scheduled</text>
  <text x="928" y="500" font-size="11" font-weight="600" fill="#4a5568">No manual posting. One command, 56 posts.</text>
  <text x="928" y="524" font-size="11" font-weight="900" fill="#CD5C3C">antekautomation.com</text>

  <!-- ===== BOTTOM BAR TEXT ===== -->
  <text x="20" y="626" font-size="11" font-weight="900" fill="#E8DCC8" letter-spacing="2">RSS</text>
  <text x="52" y="626" font-size="11" font-weight="900" fill="#CD5C3C" letter-spacing="2">→</text>
  <text x="68" y="626" font-size="11" font-weight="900" fill="#E8DCC8" letter-spacing="2">AI GENERATION</text>
  <text x="190" y="626" font-size="11" font-weight="900" fill="#CD5C3C" letter-spacing="2">→</text>
  <text x="206" y="626" font-size="11" font-weight="900" fill="#E8DCC8" letter-spacing="2">BLOTATO MCP</text>
  <text x="318" y="626" font-size="11" font-weight="900" fill="#CD5C3C" letter-spacing="2">→</text>
  <text x="334" y="626" font-size="11" font-weight="900" fill="#E8DCC8" letter-spacing="2">SCHEDULED POSTS</text>
</svg>
