  <text x="73" y="420" font-size="11" font-weight="900" fill="#E8DCC8" text-anchor="middle">RSS FEED</text>

  <text x="124" y="420" font-size="14" font-weight="900" fill="#2C2C2C">→</text>

  <rect x="142" y="400" width="110" height="30" fill="#2C2C2C" stroke="#2C2C2C" stroke-width="2"/>
  <text x="197" y="420" font-size="11" font-weight="900" fill="#E8DCC8" text-anchor="middle">AI GENERATION</text>

  <text x="258" y="420" font-size="14" font-weight="900" fill="#2C2C2C">→</text>

  <rect x="276" y="400" width="110" height="30" fill="#C8D8D0" stroke="#2C2C2C" stroke-width="2"/>
  <text x="331" y="420" font-size="11" font-weight="900" fill="#2C2C2C" text-anchor="middle">BLOTATO MCP</text>

  <text x="392" y="420" font-size="14" font-weight="900" fill="#2C2C2C">→</text>

  <rect x="410" y="400" width="120" height="30" fill="#CD5C3C" stroke="#2C2C2C" stroke-width="2"/>
