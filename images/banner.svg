  <rect x="374" y="302" width="90" height="36" fill="#E8DCC8" stroke="#2C2C2C" stroke-width="3"/>
  <text x="419" y="325" font-size="13" font-weight="900" fill="#2C2C2C" text-anchor="middle" letter-spacing="0.5">/podcast</text>

